services:
  db:
    image: postgres:15-alpine
    container_name: antam_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: antam_kitchen
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d antam_kitchen"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
      target: builder
    container_name: antam_api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:password@db:5432/antam_kitchen?schema=public}
      - DIRECT_URL=${DIRECT_URL:-postgresql://user:password@db:5432/antam_kitchen?schema=public}
      - PORT=3001
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    command: pnpm --filter api dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/database/node_modules
      - /app/packages/database/dist
      - /app/packages/repositories/node_modules
      - /app/packages/repositories/dist
      - /app/packages/types/node_modules
      - /app/packages/types/dist

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: builder
    container_name: antam_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NODE_ENV=development
    depends_on:
      api:
        condition: service_started
    command: pnpm --filter web dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
      - /app/packages/database/node_modules
      - /app/packages/database/dist
      - /app/packages/repositories/node_modules
      - /app/packages/repositories/dist
      - /app/packages/types/node_modules
      - /app/packages/types/dist


